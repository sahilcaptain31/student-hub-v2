<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .predictor-container { max-width: 600px; margin: 40px auto; padding: 20px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        
        label { 
            display: block; margin-bottom: 8px; color: var(--primary); 
            font-family: 'Orbitron'; font-size: 0.85rem; letter-spacing: 1px;
        }

        /* Gauge Styling */
        .gauge-container {
            width: 150px; height: 150px; margin: 20px auto;
            border-radius: 50%; border: 8px solid rgba(255,255,255,0.1);
            position: relative; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .gauge-fill {
            position: absolute; bottom: 0; width: 100%;
            background: linear-gradient(to top, var(--primary), var(--secondary));
            transition: height 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #resultBox {
            display: none; margin-top: 30px; padding: 25px; border-radius: 20px;
            background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border);
            text-align: center; box-shadow: 0 0 30px rgba(59, 130, 246, 0.1);
            animation: slideUp 0.5s ease-out;
        }

        .required-sgpa { 
            font-size: 3.5rem; color: var(--secondary); font-family: 'Orbitron'; 
            margin: 10px 0; text-shadow: 0 0 15px var(--secondary);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">STUDENT_HUB</a>
        <a href="/" style="text-decoration: none; color: white;">← Home</a>
    </nav>

    <div class="predictor-container">
        <div class="card">
            <h2 style="font-family: 'Orbitron'; color: var(--primary); margin-bottom: 25px; text-align: center;">TARGET_<span>PREDICTOR</span></h2>
            
            <div class="input-group">
                <label>CURRENT CGPA (0 - 10)</label>
                <input type="number" id="currCGPA" step="0.01" max="10" placeholder="e.g. 7.8">
            </div>

            <div class="input-group">
                <label>SEMESTERS COMPLETED</label>
                <input type="number" id="semsDone" max="7" placeholder="e.g. 4">
            </div>

            <div class="input-group">
                <label>GOAL CGPA</label>
                <input type="number" id="targetCGPA" step="0.01" max="10" placeholder="e.g. 8.5">
            </div>

            <button class="btn-premium" onclick="calculatePrediction()">RUN SIMULATION</button>

            <div id="resultBox">
                <div class="gauge-container">
                    <div id="gaugeFill" class="gauge-fill" style="height: 0%;"></div>
                    <span id="reqPercent" style="z-index: 1; font-weight: bold; font-family: 'Orbitron';">0%</span>
                </div>
                <h3 id="resTitle" style="font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 2px;">REQUIRED SGPA</h3>
                <div class="required-sgpa" id="reqSGPA">0.00</div>
                <p id="resDesc" style="color: var(--text-dim); font-size: 0.9rem;"></p>
                <div id="xpBadge" style="margin-top: 15px; color: #4ade80; font-weight: bold; display: none;">+25 XP ADDED 🛡️</div>
            </div>
        </div>
    </div>

    <script>
        function calculatePrediction() {
            const curr = parseFloat(document.getElementById('currCGPA').value);
            const done = parseInt(document.getElementById('semsDone').value);
            const target = parseFloat(document.getElementById('targetCGPA').value);
            const totalSems = 8;

            if(isNaN(curr) || isNaN(done) || isNaN(target) || curr > 10 || target > 10) {
                alert("Bhai, sahi values daalo (0 se 10 ke beech)!");
                return;
            }

            const remainingSems = totalSems - done;
            const required = ((target * totalSems) - (curr * done)) / remainingSems;

            const box = document.getElementById('resultBox');
            const sgpaDisp = document.getElementById('reqSGPA');
            const gauge = document.getElementById('gaugeFill');
            const reqPercentDisp = document.getElementById('reqPercent');
            
            box.style.display = 'block';
            sgpaDisp.innerText = required.toFixed(2);
            
            // Gauge animation (percentage based on 10 SGPA)
            let fillHeight = Math.min(Math.max((required / 10) * 100, 0), 100);
            gauge.style.height = fillHeight + "%";
            reqPercentDisp.innerText = Math.round(fillHeight) + "% Difficulty";

            const desc = document.getElementById('resDesc');
            const title = document.getElementById('resTitle');

            if (required > 10) {
                title.innerText = "STATUS: CRITICAL";
                title.style.color = "#ff4444";
                desc.innerText = "Mathematically impossible hai bhai. Target thoda realistic rakho.";
            } else {
                title.innerText = "STATUS: ACHIEVABLE";
                title.style.color = "var(--secondary)";
                desc.innerText = `Baaki ${remainingSems} semesters mein itni mehnat karni padegi.`;
                document.getElementById('xpBadge').style.display = 'block';
                updateXP(25);
            }
        }

        function updateXP(amount) {
            let xp = parseInt(localStorage.getItem('hXP')) || 0;
            let lvl = parseInt(localStorage.getItem('hLVL')) || 1;
            xp += amount;
            if(xp >= lvl * 100) { xp = 0; lvl++; }
            localStorage.setItem('hXP', xp);
            localStorage.setItem('hLVL', lvl);
        }
    </script>
</body>
</html>
