<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="../static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; }
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#05080a; font-family: 'Orbitron', sans-serif; margin:0; }
        .register-box { width: 350px; background: rgba(0,0,0,0.9); padding: 30px; border-radius: 20px; border: 1px solid var(--primary); box-shadow: 0 0 20px rgba(0,242,255,0.2); }
        .avatar-selection { display: flex; gap: 20px; margin: 20px 0; justify-content: center; }
        .avatar-option { cursor: pointer; border: 2px solid #222; border-radius: 15px; padding: 5px; transition: 0.3s; text-align: center; background: #000; }
        .avatar-option img { width: 80px; height: 90px; border-radius: 10px; object-fit: cover; display: block; }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .avatar-option { border-color: var(--primary); box-shadow: 0 0 15px var(--primary); transform: translateY(-5px); }
        input { width: 100%; background:rgba(255,255,255,0.05); border:1px solid #333; color:white; padding:12px; margin-bottom:10px; border-radius:5px; box-sizing: border-box; font-family: 'Orbitron'; }
        .btn-premium { width:100%; margin-top:10px; padding:15px; font-weight:bold; cursor:pointer; background:var(--primary); border:none; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); font-family: 'Orbitron'; }
    </style>
</head>
<body>
    <div class="register-box">
        <h2 style="color:var(--primary); text-align: center; letter-spacing: 2px;">NEW_IDENTITY</h2>
        <form method="POST">
            <div class="avatar-selection">
                <label>
                    <input type="radio" name="gender" value="male" checked>
                    <div class="avatar-option">
                        <img src="https://wallpapers-clan.com/wp-content/uploads/2023/11/anime-boy-purple-hoodie-pfp-1.jpg" alt="Boy">
                        <p style="font-size:0.5rem; color:var(--primary); margin:5px 0;">BOY_UNIT</p>
                    </div>
                </label>
                <label>
                    <input type="radio" name="gender" value="female">
                    <div class="avatar-option">
                        <img src="https://wallpapers-clan.com/wp-content/uploads/2023/10/anime-girl-purple-pfp-32.jpg" alt="Girl">
                        <p style="font-size:0.5rem; color:var(--primary); margin:5px 0;">ANGEL_UNIT</p>
                    </div>
                </label>
            </div>
            <input type="text" name="username" placeholder="OPERATIVE_NAME" required>
            <input type="password" name="password" placeholder="ACCESS_KEY" required>
            <button type="submit" class="btn-premium">INITIALIZE_USER</button>
        </form>
    </div>
</body>
</html>
