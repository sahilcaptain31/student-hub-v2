<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>INITIALIZE_IDENTITY | Register</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00f2ff; 
            --admin-red: #ff003c;
            --bg-dark: #05080a;
        }
        body { 
            display:flex; align-items:center; justify-content:center; 
            min-height:100vh; background: var(--bg-dark); 
            font-family: 'Orbitron', sans-serif; margin:0; 
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .register-box { 
            width: 450px; background: rgba(0,0,0,0.9); 
            padding: 30px; border-radius: 24px; 
            border: 1px solid rgba(0, 242, 255, 0.2); 
            box-shadow: 0 0 30px rgba(0,242,255,0.1); 
        }
        .avatar-selection { 
            display: flex; gap: 15px; margin: 25px 0; justify-content: center; 
        }
        .avatar-option { 
            cursor: pointer; border: 2px solid #222; 
            border-radius: 15px; padding: 8px; 
            transition: 0.3s; text-align: center; background: #111;
            width: 100px;
        }
        .avatar-option img { 
            width: 80px; height: 90px; border-radius: 10px; 
            object-fit: cover; /* Pastikan gambar mengisi kotak dengan benar terlepas dari aspek rasio */
            display: block; margin: 0 auto;
        }
        input[type="radio"] { display: none; }
        
        /* Selection Effects */
        input[value="male"]:checked + .avatar-option { border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }
        input[value="female"]:checked + .avatar-option { border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff; }
        input[value="admin"]:checked + .avatar-option { border-color: var(--admin-red); box-shadow: 0 0 15px var(--admin-red); }

        input[type="text"], input[type="password"] { 
            width: 100%; background:rgba(255,255,255,0.05); 
            border:1px solid #333; color:white; padding:15px; 
            margin-bottom:15px; border-radius:8px; box-sizing: border-box; 
            font-family: 'Orbitron'; outline: none;
        }
        input:focus { border-color: var(--primary); background: rgba(0, 242, 255, 0.05); }

        .btn-register { 
            width:100%; padding:18px; font-weight:bold; cursor:pointer; 
            background: var(--primary); color: black; border:none; 
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); 
            font-family: 'Orbitron'; transition: 0.3s;
        }
        .btn-register:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--primary); }
    </style>
</head>
<body>
    <div class="register-box">
        <h2 style="color:var(--primary); text-align: center; letter-spacing: 3px; margin-bottom: 5px;">NEW_IDENTITY</h2>
        <p style="color: #444; text-align: center; font-size: 0.7rem; margin-bottom: 20px;">SELECT_UNIT_TYPE_AND_CREDENTIALS</p>
        
        <form method="POST">
            <div class="avatar-selection">
                <label>
                    <input type="radio" name="gender" value="male" checked>
                    <div class="avatar-option">
                        <img src="{{ url_for('static', filename='images/boy.jpg') }}" alt="Boy">
                        <p style="font-size:0.5rem; color:#666; margin-top:8px;">BOY_UNIT</p>
                    </div>
                </label>

                <label>
                    <input type="radio" name="gender" value="female">
                    <div class="avatar-option">
                        <img src="{{ url_for('static', filename='images/girl.jpg') }}" alt="Girl">
                        <p style="font-size:0.5rem; color:#666; margin-top:8px;">ANGEL_UNIT</p>
                    </div>
                </label>

                <label>
                    <input type="radio" name="gender" value="admin">
                    <div class="avatar-option">
                        <img src="{{ url_for('static', filename='images/admin.jpg') }}" alt="Admin">
                        <p style="font-size:0.5rem; color:var(--admin-red); margin-top:8px;">ADMIN_UNIT</p>
                    </div>
                </label>
            </div>

            <input type="text" name="username" placeholder="OPERATIVE_NAME" required>
            <input type="password" name="password" placeholder="ACCESS_KEY" required>
            
            <button type="submit" class="btn-register">INITIALIZE_USER</button>
        </form>
    </div>
</body>
</html>
