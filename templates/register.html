<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --secondary: #7000ff; }
        
        body { 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; background: #05080a; 
            font-family: 'Orbitron', sans-serif; margin: 0;
        }

        .register-box { 
            width: 380px; background: rgba(0, 0, 0, 0.9); 
            padding: 35px; border-radius: 20px; 
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }

        .avatar-selection { 
            display: flex; gap: 25px; margin: 20px 0; justify-content: center; 
        }

        .avatar-option { 
            cursor: pointer; border: 2px solid #222; border-radius: 15px; 
            padding: 10px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            text-align: center; background: rgba(255,255,255,0.02);
        }

        .avatar-option img { 
            width: 80px; height: 80px; border-radius: 50%; 
            object-fit: cover; border: 2px solid transparent;
        }

        .avatar-option p { 
            font-size: 0.6rem; margin-top: 8px; color: #555; 
            letter-spacing: 1px; font-weight: bold;
        }
        
        /* Radio Logic */
        input[type="radio"] { display: none; }
        
        input[type="radio"]:checked + .avatar-option { 
            border-color: var(--primary); 
            background: rgba(0, 242, 255, 0.1); 
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            transform: translateY(-5px);
        }

        input[type="radio"]:checked + .avatar-option img {
            border-color: var(--primary);
        }

        input[type="radio"]:checked + .avatar-option p { 
            color: var(--primary); 
        }

        /* Input Styles */
        .input-group { width: 100%; margin-bottom: 15px; }
        
        input[type="text"], input[type="password"] {
            width: 100%; background: rgba(255,255,255,0.03); 
            border: 1px solid #222; color: white; 
            padding: 14px; border-radius: 8px;
            font-family: 'Orbitron'; font-size: 0.75rem;
            box-sizing: border-box; transition: 0.3s;
        }

        input:focus {
            outline: none; border-color: var(--primary);
            background: rgba(0, 242, 255, 0.05);
        }

        .btn-register {
            width: 100%; padding: 16px; background: var(--primary);
            color: black; border: none; font-family: 'Orbitron';
            font-weight: bold; cursor: pointer; margin-top: 15px;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%);
            transition: 0.3s;
        }

        .btn-register:hover {
            background: white; transform: scale(1.02);
        }

        .footer-link {
            text-align: center; font-size: 0.7rem; margin-top: 20px;
        }
        
        .footer-link a { color: #555; text-decoration: none; transition: 0.3s; }
        .footer-link a:hover { color: var(--primary); }
    </style>
</head>
<body>
    
    <div class="register-box">
        <h2 style="color:var(--primary); text-align: center; letter-spacing: 4px; margin-bottom: 5px;">REGISTER</h2>
        <p style="font-size: 0.55rem; color: #444; text-align: center; margin-bottom: 25px;">SELECT YOUR COMBAT AVATAR</p>
        
        <form method="POST">
            <div class="avatar-selection">
                <label>
                    <input type="radio" name="gender" value="male" checked>
                    <div class="avatar-option">
                        <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Felix&backgroundColor=b6e3f4" alt="Boy">
                        <p>BOY_UNIT</p>
                    </div>
                </label>
                
                <label>
                    <input type="radio" name="gender" value="female">
                    <div class="avatar-option">
                        <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Angel&backgroundColor=ffdfbf" alt="Girl">
                        <p>GIRL_UNIT</p>
                    </div>
                </label>
            </div>

            <div class="input-group">
                <input type="text" name="username" placeholder="OPERATIVE_ID" required>
            </div>
            
            <div class="input-group">
                <input type="password" name="password" placeholder="ACCESS_KEY" required>
            </div>
            
            <div class="input-group">
                <input type="password" name="admin_secret" placeholder="ADMIN_OVERRIDE_CODE (OPTIONAL)" style="font-size: 0.6rem;">
            </div>
            
            <button type="submit" class="btn-register">
                INITIALIZE_IDENTITY
            </button>
        </form>
        
        <div class="footer-link">
            <a href="/login">EXISTING_USER? ACCESS_TERMINAL</a>
        </div>
    </div>

</body>
</html>
