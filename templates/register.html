<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --secondary: #7000ff; }
        body { 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; background: #05080a; 
            font-family: 'Orbitron', sans-serif; margin: 0;
        }
        .register-box { 
            width: 380px; background: rgba(0, 0, 0, 0.9); 
            padding: 30px; border-radius: 20px; 
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }
        .avatar-selection { display: flex; gap: 20px; margin: 20px 0; justify-content: center; }
        .avatar-option { 
            cursor: pointer; border: 2px solid #222; border-radius: 15px; 
            padding: 10px; transition: 0.3s; text-align: center; background: #111;
        }
        .avatar-option img { 
            width: 90px; height: 90px; border-radius: 50%; 
            object-fit: cover; border: 2px solid transparent;
        }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .avatar-option { 
            border-color: var(--primary); background: rgba(0, 242, 255, 0.1); 
            box-shadow: 0 0 15px var(--primary); transform: scale(1.05);
        }
        .btn-register {
            width: 100%; padding: 15px; background: var(--primary); color: black; 
            border: none; font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); margin-top: 15px;
        }
        input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #333; 
            color: white; padding: 12px; margin-bottom: 10px; border-radius: 5px; box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="register-box">
        <h2 style="color:var(--primary); text-align: center; letter-spacing: 3px;">INITIALIZE_USER</h2>
        <form method="POST">
            <div class="avatar-selection">
                <label>
                    <input type="radio" name="gender" value="male" checked>
                    <div class="avatar-option">
                        <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Felix&backgroundColor=b6e3f4" alt="Boy">
                        <p style="font-size: 0.6rem; color: #666; margin-top: 5px;">BOY_UNIT</p>
                    </div>
                </label>
                <label>
                    <input type="radio" name="gender" value="female">
                    <div class="avatar-option">
                        <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Angel&backgroundColor=ffdfbf" alt="Girl">
                        <p style="font-size: 0.6rem; color: #666; margin-top: 5px;">GIRL_UNIT</p>
                    </div>
                </label>
            </div>
            <input type="text" name="username" placeholder="OPERATIVE_NAME" required>
            <input type="password" name="password" placeholder="ACCESS_KEY" required>
            <button type="submit" class="btn-register">CREATE_IDENTITY</button>
        </form>
    </div>
</body>
</html>
