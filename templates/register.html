<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --secondary: #7000ff; }
        body { 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; background: #05080a; 
            font-family: 'Orbitron', sans-serif; margin: 0;
        }
        .register-box { 
            width: 400px; background: rgba(0, 0, 0, 0.9); 
            padding: 30px; border-radius: 20px; 
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }
        .avatar-selection { display: flex; gap: 20px; margin: 25px 0; justify-content: center; }
        .avatar-option { 
            cursor: pointer; border: 2px solid #222; border-radius: 15px; 
            padding: 8px; transition: 0.4s; text-align: center; background: #111;
        }
        .avatar-option img { 
            width: 100px; height: 120px; border-radius: 10px; 
            object-fit: cover; border: 1px solid transparent;
        }
        .avatar-option p { font-size: 0.6rem; margin-top: 8px; color: #555; font-weight: bold; }
        
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .avatar-option { 
            border-color: var(--primary); background: rgba(0, 242, 255, 0.1); 
            box-shadow: 0 0 20px var(--primary); transform: translateY(-5px);
        }
        input[type="radio"]:checked + .avatar-option p { color: var(--primary); }

        .input-group { width: 100%; margin-bottom: 15px; }
        input[type="text"], input[type="password"] {
            width: 100%; background: rgba(255,255,255,0.05); 
            border: 1px solid #333; color: white; padding: 12px; border-radius: 5px;
            font-family: 'Orbitron'; box-sizing: border-box;
        }
        .btn-register {
            width: 100%; padding: 15px; background: var(--primary); color: black; 
            border: none; font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }
    </style>
</head>
<body>
    <div class="register-box">
        <h2 style="color:var(--primary); text-align: center; letter-spacing: 3px;">CREATE_ID</h2>
        <p style="font-size: 0.6rem; color: #666; text-align: center;">SELECT YOUR NEURAL AVATAR</p>
        
        <form method="POST">
            <div class="avatar-selection">
                <label>
                    <input type="radio" name="gender" value="male" checked>
                    <div class="avatar-option">
                        <img src="https://wallpapers-clan.com/wp-content/uploads/2023/11/anime-boy-purple-hoodie-pfp-1.jpg" alt="Boy">
                        <p>BOY_UNIT</p>
                    </div>
                </label>
                
                <label>
                    <input type="radio" name="gender" value="female">
                    <div class="avatar-option">
                        <img src="https://wallpapers-clan.com/wp-content/uploads/2023/10/anime-girl-purple-pfp-32.jpg" alt="Girl">
                        <p>ANGEL_UNIT</p>
                    </div>
                </label>
            </div>

            <div class="input-group"><input type="text" name="username" placeholder="USERNAME" required></div>
            <div class="input-group"><input type="password" name="password" placeholder="PASSWORD" required></div>
            <div class="input-group"><input type="password" name="admin_secret" placeholder="ADMIN_CODE (OPTIONAL)"></div>
            
            <button type="submit" class="btn-register">REGISTER_OPERATIVE</button>
        </form>
    </div>
</body>
</html>
