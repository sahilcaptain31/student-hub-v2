<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .upload-section {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1));
            border: 2px dashed var(--primary);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 40px;
        }
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .contribution-card {
            border-left: 4px solid var(--secondary);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">HUB.NOTES</a>
        <a href="/">Back</a>
    </nav>

    <div style="max-width: 1100px; margin: 0 auto; padding: 20px;">
        <h1 style="font-family: 'Orbitron'; text-align: center; margin-bottom: 30px;">NOTES_<span>VAULT</span></h1>

        <div class="upload-section">
            <h3 style="color: var(--primary); margin-bottom: 10px;">🚀 Share Notes & Earn +50 XP</h3>
            <p style="color: var(--text-dim); margin-bottom: 20px; font-size: 0.9rem;">Upload your Drive link to help fellow students.</p>
            
            <form id="uploadForm" onsubmit="handleUpload(event)" style="max-width: 500px; margin: 0 auto;">
                <input type="text" id="subName" placeholder="Subject Name (e.g. Physics Unit 2)" required>
                <input type="url" id="fileUrl" placeholder="Paste Google Drive Link" required>
                <button type="submit" class="btn-premium">CONTRIBUTE & GET XP</button>
            </form>
        </div>

        <h2 style="font-family: 'Orbitron'; font-size: 1.2rem; margin-bottom: 20px; color: var(--secondary);">AVAILABLE_RESOURCES</h2>
        
        <div class="file-grid" id="notesGrid">
            {% for item in items %}
            <div class="card contribution-card">
                <h3>{{ item['subject'] }}</h3>
                <p style="font-size: 0.8rem; color: var(--text-dim);">Verified Resource</p>
                <button onclick="window.open('{{ item['url'] }}')" class="btn-premium" style="margin-top: 15px;">VIEW PDF</button>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>

        // --- ADSTERRA SMARTLINK FUNCTION ---
        function paisaWalaDownload(up4everLink) {
            // Tumhara Smartlink yahan hai
            const smartLink = "https://www.effectivegatecpm.com/wu8rn0xa?key=b85ba7da0189c934b5b86b55ab2582b6";

            // 1. Pehle naye tab mein ad khulegi
            window.open(smartLink, '_blank');

            // 2. Phir 1 second baad asli file link par bhej denge
            setTimeout(function() {
                if(up4everLink && up4everLink !== 'None') {
                    window.location.href = up4everLink;
                } else {
                    alert("Link valid nahi hai!");
                }
            }, 1000);
        }


        function handleUpload(event) {
            event.preventDefault();
            const subject = document.getElementById('subName').value;
            const url = document.getElementById('fileUrl').value;

            // Give XP Reward
            let xp = parseInt(localStorage.getItem('hXP')) || 0;
            let lvl = parseInt(localStorage.getItem('hLVL')) || 1;
            
            xp += 50;
            if(xp >= lvl * 100) { xp = 0; lvl++; alert("LEVEL UP! LVL " + lvl); }
            
            localStorage.setItem('hXP', xp);
            localStorage.setItem('hLVL', lvl);

            // Backend ko data bhej rhe hain (Taki ye database mein save ho jaye)
            fetch('/upload', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({subject: subject, file_url: url})
            }).then(() => {
                alert("Notes Sent for Verification! +50 XP Added 🚀");
                location.reload();
            });
        }
    </script>
</body>
</html>
