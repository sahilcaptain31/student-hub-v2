<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .planner-container { max-width: 800px; margin: 30px auto; padding: 20px; }
        .task-input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        
        .task-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .task-card.completed {
            border-color: #4ade80;
            opacity: 0.6;
            background: rgba(74, 222, 128, 0.05);
        }

        .task-info { display: flex; align-items: center; gap: 15px; }
        .check-btn {
            width: 25px; height: 25px; border-radius: 50%;
            border: 2px solid var(--primary); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .completed .check-btn { background: #4ade80; border-color: #4ade80; }
        
        .delete-btn { color: #ff4444; cursor: pointer; font-size: 0.8rem; opacity: 0.6; }
        .delete-btn:hover { opacity: 1; }

        .xp-popup {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--primary); color: white;
            padding: 10px 20px; border-radius: 10px;
            display: none; animation: slideUp 0.5s forwards;
        }

        @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">HUB.PLANNER</a>
        <a href="/">Back to Home</a>
    </nav>

    <div class="planner-container">
        <h1 style="font-family: 'Orbitron'; color: var(--primary); margin-bottom: 10px;">DAILY_<span>PLANNER</span></h1>
        <p style="color: var(--text-dim); margin-bottom: 30px;">Complete tasks to earn +10 XP each!</p>

        <div class="task-input-group">
            <input type="text" id="taskInput" placeholder="What's your goal today?" style="margin-bottom: 0;">
            <button class="btn-premium" onclick="addTask()" style="width: auto;">ADD</button>
        </div>

        <div id="taskList">
            </div>
    </div>

    <div id="xpPopup" class="xp-popup">+10 XP Earned! 🚀</div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('myTasks')) || [];
        let xp = parseInt(localStorage.getItem('hXP')) || 0;
        let lvl = parseInt(localStorage.getItem('hLVL')) || 1;

        function saveTasks() {
            localStorage.setItem('myTasks', JSON.stringify(tasks));
            renderTasks();
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            if(input.value.trim() === "") return;
            
            tasks.push({
                id: Date.now(),
                text: input.value,
                completed: false
            });
            input.value = "";
            saveTasks();
        }

        function toggleTask(id) {
            tasks = tasks.map(t => {
                if(t.id === id && !t.completed) {
                    // Give XP only first time it's completed
                    giveXP(10);
                    return { ...t, completed: true };
                }
                return t;
            });
            saveTasks();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
        }

        function giveXP(amount) {
            xp += amount;
            if(xp >= lvl * 100) {
                xp = 0;
                lvl++;
                alert("LEVEL UP! You reached Level " + lvl);
            }
            localStorage.setItem('hXP', xp);
            localStorage.setItem('hLVL', lvl);
            
            // Show Popup
            const popup = document.getElementById('xpPopup');
            popup.style.display = 'block';
            setTimeout(() => { popup.style.display = 'none'; }, 2000);
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = tasks.map(t => `
                <div class="task-card ${t.completed ? 'completed' : ''}">
                    <div class="task-info">
                        <div class="check-btn" onclick="toggleTask(${t.id})">
                            ${t.completed ? '✓' : ''}
                        </div>
                        <span style="${t.completed ? 'text-decoration: line-through;' : ''}">${t.text}</span>
                    </div>
                    <span class="delete-btn" onclick="deleteTask(${t.id})">DELETE</span>
                </div>
            `).join('');
        }

        // Initial Load
        renderTasks();
    </script>
</body>
</html>
