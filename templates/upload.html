<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>ADMIN_CONTROL | Neural Vault</title>
</head>
<body style="background: #05080a; color: white; font-family: 'Share Tech Mono', sans-serif; padding: 40px;">
    
    <h1 style="color:var(--primary); font-family:'Orbitron';">ADMIN_OS</h1>
    <a href="/" style="color:var(--secondary); text-decoration:none;">← Back Home</a>

    <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
        <div class="card" style="background: rgba(255, 255, 255, 0.05); border: 1px solid #4a90e2; padding: 30px; border-radius: 20px;">
            <h3 style="text-align:center;">UPLOAD CONTENT (URL)</h3>
            
            <form action="/upload" method="post">
                <input type="text" name="subject" placeholder="Subject Name (e.g. Maths Unit 1)" required 
                       style="width: 100%; padding: 15px; background: #1a1f2b; color: white; border: 1px solid #333; border-radius: 12px; margin-bottom: 15px;">

                <select id="moduleSelect" name="type" onchange="toggleFolder()" 
                        style="width: 100%; padding: 15px; background: #000; color: white; border: 1px solid #333; border-radius: 12px; margin-bottom: 15px;">
                    <option value="notes">Notes</option>
                    <option value="pyq">PYQ</option>
                </select>

                <div id="folderDiv" style="display: none; border: 1px dashed #00f2ff; padding: 10px; border-radius: 10px; margin-bottom: 15px;">
                    <p style="font-size: 0.7rem; color: #00f2ff; margin-bottom: 5px;">FOLDER_NAME (Grouping):</p>
                    <input type="text" id="folderInput" name="folder_name" placeholder="e.g. Set 2024 Boards" 
                           style="width: 100%; padding: 10px; background: #1a1f2b; color: #00f2ff; border: 1px solid #00f2ff; border-radius: 8px;">
                </div>

                <input type="url" name="file_url" placeholder="Paste Google Drive / Direct Link here" required 
                       style="width: 100%; padding: 15px; background: #1a1f2b; color: white; border: 1px solid #333; border-radius: 12px; margin-bottom: 20px;">

                <button type="submit" style="width: 100%; background: linear-gradient(90deg, #4facfe 0%, #00f2ff 100%); border: none; padding: 15px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer;">
                    DEPLOY TO DATABASE
                </button>
            </form>
        </div>

        <div class="card" style="background: rgba(255, 255, 255, 0.05); border: 1px solid #333; padding: 30px; border-radius: 20px;">
            <h3>REGISTERED USERS</h3>
            <ul style="list-style: none; padding: 0;">
                {% for u in users %}
                <li style="margin-bottom: 10px; font-size: 0.9rem;">
                    <span style="color: #4facfe;">{{ u.username }}</span> | LVL: {{ u.level }} | Role: {{ u.role }}
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>

    <script>
        function toggleFolder() {
            var select = document.getElementById("moduleSelect");
            var folderDiv = document.getElementById("folderDiv");
            var folderInput = document.getElementById("folderInput");

            if (select.value === "pyq") {
                folderDiv.style.display = "block";
                folderInput.required = true;
            } else {
                folderDiv.style.display = "none";
                folderInput.required = false;
            }
        }
        // Run on load
        window.onload = toggleFolder;
    </script>
</body>
</html>
