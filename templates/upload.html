<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>ADMIN_CONTROL | Neural Vault</title>
</head>
<body style="background: #05080a; color: white; font-family: 'Share Tech Mono', sans-serif;">
    <nav class="navbar" style="display: flex; justify-content: space-between; padding: 15px 5%; border-bottom: 1px solid #ff003c;">
        <a href="/" class="logo" style="color: #ff003c; text-decoration: none; font-family: 'Orbitron'; font-weight: bold;">ADMIN.VAULT</a>
        <a href="/" style="color: white; text-decoration: none;">[ EXIT_ROOT ]</a>
    </nav>

    <div class="auth-container" style="display: flex; justify-content: center; align-items: center; height: 90vh;">
        <div class="auth-card" style="background: rgba(255, 0, 60, 0.05); border: 1px solid #ff003c; padding: 30px; border-radius: 12px; width: 420px; box-shadow: 0 0 20px rgba(255, 0, 60, 0.1);">
            <h3 style="font-family: 'Orbitron'; color: #ff003c; text-align: center; margin-bottom: 25px; letter-spacing: 2px;">UPLOAD_CORE_RESOURCE</h3>
            
            <form action="/upload" method="post">
                <p style="font-size: 0.7rem; opacity: 0.6; margin-bottom: 5px; color: #ff003c;">[01] SELECT_MODULE:</p>
                <select id="moduleType" name="type" onchange="checkSelection()" style="width: 100%; padding: 12px; background: #000; color: white; border: 1px solid #ff003c; margin-bottom: 15px; font-family: 'Share Tech Mono';">
                    <option value="notes">Notes Section</option>
                    <option value="pyq">PYQ Section (Previous Papers)</option>
                </select>

                <p style="font-size: 0.7rem; opacity: 0.6; margin-bottom: 5px; color: #ff003c;">[02] SUBJECT_NAME:</p>
                <input type="text" name="subject" placeholder="e.g. Physics" required 
                       style="width: 100%; padding: 12px; background: #000; color: white; border: 1px solid #ff003c; margin-bottom: 15px; box-sizing: border-box;">

                <div id="folderBox" style="display: none; border: 1px dashed #00f2ff; padding: 10px; border-radius: 8px; margin-bottom: 15px;">
                    <p style="font-size: 0.7rem; opacity: 0.6; margin-bottom: 5px; color: #00f2ff;">[03] FOLDER_NAME (Grouping ID):</p>
                    <input type="text" id="fInput" name="folder_name" placeholder="e.g. Board Paper 2024" 
                           style="width: 100%; padding: 10px; background: #000; color: #00f2ff; border: 1px solid #00f2ff; box-sizing: border-box;">
                    <small style="display: block; font-size: 0.6rem; color: #888; margin-top: 5px;">*Grouping makes UI clean.</small>
                </div>

                <p style="font-size: 0.7rem; opacity: 0.6; margin-bottom: 5px; color: #ff003c;">[04] RESOURCE_URL (Direct Link):</p>
                <input type="url" name="file_url" placeholder="https://drive.google.com/..." required 
                       style="width: 100%; padding: 12px; background: #000; color: white; border: 1px solid #ff003c; margin-bottom: 25px; box-sizing: border-box;">

                <button type="submit" 
                        style="width: 100%; background: #ff003c; color: white; border: none; padding: 15px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; letter-spacing: 1px; transition: 0.3s;">
                    PUSH_TO_DATABASE
                </button>
            </form>
        </div>
    </div>

    <script>
        function checkSelection() {
            var type = document.getElementById("moduleType").value;
            var box = document.getElementById("folderBox");
            var input = document.getElementById("fInput");

            if (type === "pyq") {
                box.style.display = "block";
                input.required = true;
            } else {
                box.style.display = "none";
                input.required = false;
                input.value = "General Notes"; // Default value for database
            }
        }

        // Isse page load hote hi check ho jayega
        window.onload = checkSelection;
    </script>
</body>
</html>
