<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>ADMIN_CONTROL | Neural Vault</title>
    <style>
        :root { --primary: #ff003c; --secondary: #00f2ff; --bg: #05080a; }
        body { background: var(--bg); color: white; font-family: 'Share Tech Mono', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: rgba(255, 255, 255, 0.05); border: 1px solid #333; padding: 40px; border-radius: 20px; width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        label { display: block; font-size: 0.7rem; color: var(--primary); margin-bottom: 8px; letter-spacing: 1px; }
        input, select { width: 100%; padding: 15px; background: #111; color: white; border: 1px solid #333; border-radius: 12px; margin-bottom: 20px; box-sizing: border-box; font-family: 'Share Tech Mono'; }
        #folderDiv { display: none; border: 1px dashed var(--secondary); padding: 15px; border-radius: 12px; background: rgba(0, 242, 255, 0.05); margin-bottom: 20px; }
        .btn-deploy { width: 100%; background: linear-gradient(90deg, #ff003c 0%, #ff4d00 100%); color: white; border: none; padding: 18px; border-radius: 12px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="card" style="border-color: var(--primary);">
        <h3 style="font-family:'Orbitron'; text-align: center; margin-bottom: 30px;">CORE_UPLOAD_MODULE</h3>
        <form action="/upload" method="post">
            <label>[01] RESOURCE_TYPE</label>
            <select id="moduleSelect" name="type" onchange="toggleFolderLogic()">
                <option value="notes">Lecture Notes</option>
                <option value="pyq">Previous Year Papers (PYQ)</option>
            </select>

            <label>[02] SUBJECT_IDENTIFIER</label>
            <input type="text" name="subject" placeholder="e.g. Applied Physics-II" required>

            <div id="folderDiv">
                <label style="color: var(--secondary);">[03] GROUPING_FOLDER (PYQ ONLY)</label>
                <input type="text" id="folderInput" name="folder_name" placeholder="e.g. EndSem_2024" style="border-color: var(--secondary); color: var(--secondary);">
            </div>

            <label>[04] DATA_SOURCE_URL</label>
            <input type="url" name="file_url" placeholder="https://drive.google.com/..." required>

            <button type="submit" class="btn-deploy">PUSH_TO_DATABASE</button>
        </form>
    </div>

    <script>
        function toggleFolderLogic() {
            var select = document.getElementById("moduleSelect");
            var div = document.getElementById("folderDiv");
            var input = document.getElementById("folderInput");
            if (select.value === "pyq") {
                div.style.display = "block";
                input.required = true;
            } else {
                div.style.display = "none";
                input.required = false;
                input.value = "";
            }
        }
        window.onload = toggleFolderLogic;
    </script>
</body>
</html>
